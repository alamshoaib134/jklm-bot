<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bombGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="fuseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#ffd93d"/>
      <stop offset="100%" style="stop-color:#ff4757"/>
    </linearGradient>
  </defs>
  <!-- Bomb body -->
  <circle cx="50" cy="55" r="35" fill="url(#bombGrad)" stroke="#555" stroke-width="2"/>
  <!-- Highlight -->
  <ellipse cx="38" cy="42" rx="8" ry="6" fill="#555" opacity="0.5"/>
  <!-- Fuse holder -->
  <rect x="45" y="18" width="10" height="8" rx="2" fill="#555"/>
  <!-- Fuse -->
  <path d="M50 18 Q55 10 60 8 Q65 6 70 10" stroke="#8B4513" stroke-width="3" fill="none"/>
  <!-- Spark -->
  <circle cx="70" cy="10" r="6" fill="url(#fuseGrad)">
    <animate attributeName="r" values="4;8;4" dur="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.7;1" dur="0.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Spark rays -->
  <g fill="url(#fuseGrad)">
    <circle cx="78" cy="8" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="72" cy="3" r="1.5">
      <animate attributeName="opacity" values="1;0;1" dur="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="65" cy="5" r="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.35s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
